<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Origin unreachable</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fafaf9;
        --fg: #141413;
        --fg-secondary: #52514e;
        --rule: #292826;
        --countdown: color-mix(in srgb, var(--fg-secondary) 42%, var(--fg) 58%);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0c0c0b;
          --fg: #ecebe8;
          --fg-secondary: #9c9a94;
          --rule: #5c5954;
          --countdown: color-mix(in srgb, var(--fg-secondary) 94%, var(--fg) 6%);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        background-color: var(--bg);
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(1.25rem, 4vw, 2.5rem);
        font:
          15px/1.5 ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Helvetica Neue",
          sans-serif;
        background-color: var(--bg);
        color: var(--fg);
      }

      main {
        width: min(100%, 26rem);
        margin: 0;
        padding: 0 0 0 1.125rem;
        border-left: 2px solid var(--rule);
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
      }

      h1 {
        margin: 0;
        font-size: 1.0625rem;
        font-weight: 500;
        line-height: 1.4;
        letter-spacing: -0.015em;
        color: var(--fg);
      }

      p {
        margin: 0;
        font-size: 0.875rem;
        line-height: 1.55;
        color: var(--fg-secondary);
      }

      .count {
        margin-top: 0.25rem;
      }

      #countdown {
        margin-inline: 0.28em;
        font-variant-numeric: tabular-nums;
        color: var(--countdown);
      }

      @media (prefers-color-scheme: dark) {
        #countdown {
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Origin server is not reachable.</h1>
      <p>The proxy will keep retrying automatically.</p>
      <p class="count">Retrying in <span id="countdown">5</span>s</p>
    </main>

    <script>
      (() => {
        let remaining = 5;
        const countdown = document.getElementById("countdown");

        function tick() {
          countdown.textContent = remaining;
          if (remaining === 0) {
            location.reload();
            return;
          }
          remaining -= 1;
          setTimeout(tick, 1000);
        }

        tick();
      })();
    </script>
  </body>
</html>
